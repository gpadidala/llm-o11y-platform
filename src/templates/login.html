<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - LLM O11y Platform</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a0e17;
            --bg-card: rgba(28, 33, 40, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --purple: #a855f7;
            --purple-dark: #7c3aed;
            --blue: #3b82f6;
            --coral: #f43f5e;
            --green: #22c55e;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(6, 182, 212, 0.04) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-5%, -5%) rotate(3deg); }
        }

        /* Grid pattern overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
        }

        /* Logo */
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(168, 85, 247, 0.3);
        }

        .login-logo-icon img {
            width: 40px;
            height: 40px;
        }

        .login-logo-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-logo-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Card */
        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 36px;
            box-shadow:
                0 8px 40px rgba(0, 0, 0, 0.4),
                0 0 80px rgba(168, 85, 247, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .login-card-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
            text-align: center;
        }

        .login-card-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 28px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 17, 23, 0.8);
            border: 1px solid rgba(45, 51, 59, 0.6);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .form-input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.12);
            background: rgba(15, 17, 23, 0.95);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        /* Error message */
        .login-error {
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.25);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #fca5a5;
            animation: shakeIn 0.4s ease-out;
        }

        .login-error-icon {
            flex-shrink: 0;
            font-size: 16px;
        }

        @keyframes shakeIn {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(2px); }
        }

        /* Submit button */
        .login-btn {
            width: 100%;
            padding: 13px 24px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(168, 85, 247, 0.25);
            margin-top: 4px;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(168, 85, 247, 0.35);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .login-btn:hover::after {
            opacity: 1;
        }

        /* Footer branding */
        .login-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .login-footer span {
            color: var(--text-secondary);
        }

        /* Default credentials hint */
        .login-hint {
            text-align: center;
            margin-top: 16px;
            padding: 10px 16px;
            background: rgba(168, 85, 247, 0.06);
            border: 1px solid rgba(168, 85, 247, 0.12);
            border-radius: 10px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .login-hint code {
            background: rgba(168, 85, 247, 0.15);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 12px;
            color: #c084fc;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        /* Password toggle */
        .input-wrapper {
            position: relative;
        }

        .input-wrapper .form-input {
            padding-right: 44px;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Logo -->
        <div class="login-logo">
            <div class="login-logo-icon">
                <img src="/static/logo.svg" alt="Logo" onerror="this.parentElement.innerHTML='&#x1F9E0;'">
            </div>
            <div class="login-logo-text">LLM O11y Platform</div>
            <div class="login-logo-sub">AI Gateway & Observability</div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <div class="login-card-title">Welcome back</div>
            <div class="login-card-subtitle">Sign in to access the platform</div>

            {% if error %}
            <div class="login-error">
                <span class="login-error-icon">&#x26A0;</span>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="post" action="/login" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="form-input"
                        placeholder="Enter your username"
                        required
                        autocomplete="username"
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-input"
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword()" title="Show password">
                            &#x1F441;
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
            </form>

            <div class="login-hint">
                Default credentials: <code>admin</code> / <code>admin</code>
            </div>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <span>LLM O11y Platform</span> &middot; v0.2.0
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const btn = document.querySelector('.password-toggle');
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = '&#x1F576;';
            } else {
                input.type = 'password';
                btn.innerHTML = '&#x1F441;';
            }
        }

        // Prevent double-submit
        document.getElementById('loginForm').addEventListener('submit', function() {
            var btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            btn.style.opacity = '0.7';
        });
    </script>
</body>
</html>
