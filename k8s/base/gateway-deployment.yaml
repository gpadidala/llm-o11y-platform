apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-o11y-gateway
  namespace: llm-o11y
  labels:
    app.kubernetes.io/name: llm-o11y-gateway
    app.kubernetes.io/part-of: llm-o11y-platform
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-o11y-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-o11y-gateway
        app.kubernetes.io/part-of: llm-o11y-platform
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: gateway
          image: llm-o11y-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: llm-o11y-gateway-config
            - secretRef:
                name: llm-o11y-gateway-secrets
                optional: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: llm-o11y-gateway
  namespace: llm-o11y
  labels:
    app.kubernetes.io/name: llm-o11y-gateway
    app.kubernetes.io/part-of: llm-o11y-platform
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: llm-o11y-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
