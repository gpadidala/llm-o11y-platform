apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: llm-o11y
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: llm-o11y-platform
    app.kubernetes.io/component: collector
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 5s
        limit_mib: 400
        spike_limit_mib: 100
      attributes:
        actions:
          - key: service.platform
            value: llm-o11y
            action: upsert

    exporters:
      otlphttp/tempo:
        endpoint: http://tempo.llm-o11y.svc:4318
      prometheusremotewrite:
        endpoint: http://prometheus.llm-o11y.svc:9090/api/v1/write
      otlphttp/loki:
        endpoint: http://loki.llm-o11y.svc:3100/otlp
      debug:
        verbosity: basic

    connectors:
      spanmetrics:
        histogram:
          explicit:
            buckets: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10]
        dimensions:
          - name: service.name
          - name: llm.provider
          - name: llm.model

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, attributes, batch]
          exporters: [otlphttp/tempo, spanmetrics, debug]
        metrics:
          receivers: [otlp, spanmetrics]
          processors: [memory_limiter, batch]
          exporters: [prometheusremotewrite, debug]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, attributes, batch]
          exporters: [otlphttp/loki, debug]
      telemetry:
        logs:
          level: info
        metrics:
          address: 0.0.0.0:8888
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: llm-o11y
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: llm-o11y-platform
    app.kubernetes.io/component: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/part-of: llm-o11y-platform
        app.kubernetes.io/component: collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          args:
            - --config=/etc/otelcol/otel-collector-config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: metrics
              containerPort: 8888
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: llm-o11y
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: llm-o11y-platform
    app.kubernetes.io/component: collector
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
    - name: metrics
      port: 8888
      targetPort: metrics
      protocol: TCP
