# =============================================================================
# Grafana Loki Configuration
# =============================================================================
# Single-node Loki setup for local development. Receives logs from the
# OpenTelemetry Collector via the Loki push API. Uses local filesystem
# storage with the TSDB index (v13 schema).
# =============================================================================

# Disable multi-tenancy for local development.
auth_enabled: false

# HTTP API for Grafana datasource queries and log ingestion.
server:
  http_listen_port: 3100
  grpc_listen_port: 9096

# -----------------------------------------------------------------------------
# Common Settings
# -----------------------------------------------------------------------------
# Shared configuration inherited by all components. Using a single path
# prefix keeps WAL, chunks, and rules co-located under /loki.
common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# -----------------------------------------------------------------------------
# Query Range
# -----------------------------------------------------------------------------
# Align queries to cache boundaries for better performance.
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# -----------------------------------------------------------------------------
# Schema Configuration
# -----------------------------------------------------------------------------
# TSDB index with filesystem object store. The v13 schema supports
# structured metadata (useful for OpenTelemetry resource attributes).
schema_config:
  configs:
    - from: "2020-10-24"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# -----------------------------------------------------------------------------
# Ruler
# -----------------------------------------------------------------------------
# Alerting rules storage. Even if unused, this avoids startup warnings.
ruler:
  alertmanager_url: http://localhost:9093

# -----------------------------------------------------------------------------
# Limits
# -----------------------------------------------------------------------------
# Relaxed limits for local development.
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h    # 7 days
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  per_stream_rate_limit: 5MB
  per_stream_rate_limit_burst: 15MB

# -----------------------------------------------------------------------------
# Analytics
# -----------------------------------------------------------------------------
# Disable anonymous usage reporting for local setups.
analytics:
  reporting_enabled: false
